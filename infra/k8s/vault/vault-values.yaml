# infra/k8s/vault/vault-values.yaml
# Vault 1.15 HA Raft — KIND / k3d / Rancher Desktop compatible

global:
  enabled: true
  tlsDisable: true

injector:
  enabled: true
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL

server:
  image:
    repository: hashicorp/vault
    tag: "1.15.6"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # THIS is the correct block for the main Vault container
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true

    seccompProfile:
      type: RuntimeDefault

    capabilities:
      drop:
        - ALL

  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbycode=204&uninitcode=204&sealedcode=204"
    initialDelaySeconds: 60
    periodSeconds: 5
    failureThreshold: 6

  serviceAccount:
    create: true
    name: vault
    automountServiceAccountToken: true

  extraVolumeMounts:
    - name: vault-audit
      mountPath: /vault/audit

  extraContainers:
    - name: promtail-sidecar
      image: grafana/promtail:2.9.4

      args:
        - -config.file=/etc/promtail/config.yaml

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true

        seccompProfile:
          type: RuntimeDefault

        capabilities:
          drop:
            - ALL

      volumeMounts:
        - name: vault-audit
          mountPath: /vault/audit
          readOnly: true

        - name: promtail-config
          mountPath: /etc/promtail
          readOnly: true

  volumes:
    - name: promtail-config
      configMap:
        name: promtail-vault-config

    - name: vault-audit
      emptyDir: {}

  ha:
    enabled: true
    replicas: 3

    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true
        cluster_name = "contextmesh-vault"
        log_level = "info"
        log_format = "json"

        listener "tcp" {
          tls_disable = true
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
          node_id = "${HOSTNAME}"

          retry_join {
            leader_api_addr = "http://vault-0.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-1.vault-internal:8200"
          }

          retry_join {
            leader_api_addr = "http://vault-2.vault-internal:8200"
          }
        }

        service_registration "kubernetes" {}

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }

  dataStorage:
    enabled: true
    size: 2Gi
    storageClass: local-path
    accessMode: ReadWriteOnce

ui:
  enabled: true
  serviceType: ClusterIP
