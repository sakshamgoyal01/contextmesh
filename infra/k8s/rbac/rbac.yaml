---
# remediation-agent needs to read resources to generate patches — still read-only on K8s
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contextmesh:remediation-agent
  labels:
    app.kubernetes.io/part-of: contextmesh
rules:
- apiGroups: [""]
  resources: ["pods", "services", "serviceaccounts", "configmaps"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: contextmesh:remediation-agent
