---
# ============================================================
# contextmesh-ingestion — crawler ServiceAccounts + RBAC
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: crawler-k8s
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/component: crawler-k8s
    app.kubernetes.io/part-of: contextmesh
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crawler-iam
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/component: crawler-iam
    app.kubernetes.io/part-of: contextmesh
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crawler-cicd
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/component: crawler-cicd
    app.kubernetes.io/part-of: contextmesh
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crawler-secrets
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/component: crawler-secrets
    app.kubernetes.io/part-of: contextmesh
automountServiceAccountToken: false

---
# crawler-k8s needs cluster-wide read on core infra resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contextmesh:crawler-k8s
  labels:
    app.kubernetes.io/part-of: contextmesh
rules:
- apiGroups: [""]
  resources: ["pods", "services", "serviceaccounts", "namespaces", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies", "ingresses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: contextmesh:crawler-k8s
  labels:
    app.kubernetes.io/part-of: contextmesh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: contextmesh:crawler-k8s
subjects:
- kind: ServiceAccount
  name: crawler-k8s
  namespace: contextmesh-ingestion

---
# crawler-iam: no K8s API access — uses AWS SDK, no ClusterRole needed
# Namespace-scoped role only for own config/secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crawler-iam
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/part-of: contextmesh
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["crawler-iam-config"]
  verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crawler-iam
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/part-of: contextmesh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crawler-iam
subjects:
- kind: ServiceAccount
  name: crawler-iam
  namespace: contextmesh-ingestion

---
# crawler-cicd: receives webhooks, reads own configmap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crawler-cicd
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/part-of: contextmesh
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["crawler-cicd-config"]
  verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crawler-cicd
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/part-of: contextmesh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crawler-cicd
subjects:
- kind: ServiceAccount
  name: crawler-cicd
  namespace: contextmesh-ingestion

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crawler-secrets
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/part-of: contextmesh
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["crawler-secrets-config"]
  verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crawler-secrets
  namespace: contextmesh-ingestion
  labels:
    app.kubernetes.io/part-of: contextmesh
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crawler-secrets
subjects:
- kind: ServiceAccount
  name: crawler-secrets
  namespace: contextmesh-ingestion

