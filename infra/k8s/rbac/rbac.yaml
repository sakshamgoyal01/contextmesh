  namespace: contextmesh-system
  labels:
    app.kubernetes.io/component: argocd-app-watcher
    app.kubernetes.io/part-of: contextmesh
automountServiceAccountToken: false

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: contextmesh:argocd-app-watcher
  labels:
    app.kubernetes.io/part-of: contextmesh
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications", "appprojects"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: contextmesh:argocd-app-watcher
  labels:
    app.kubernetes.io/part-of: contextmesh
